name: wordpress-template
region: nyc

services:
  - name: wordpress
    github:
      repo: Independent-Business-Group/wordpress-template
      branch: main
      deploy_on_push: true
    build_command: chmod +x .do/deploy.sh && ./.do/deploy.sh
    run_command: heroku-php-apache2
    environment_slug: php
    envs:
      - key: DB_NAME
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DB_USER
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DB_PASSWORD
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DB_HOST
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DB_PORT
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: TABLE_PREFIX
        scope: RUN_AND_BUILD_TIME
    health_check:
      http_path: /
      port: 8080
      initial_delay_seconds: 90
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
